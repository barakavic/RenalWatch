services:
  db:
    image: postgres:16
    container_name: renalwatch-db
    environment:
      POSTGRES_USER: renal
      POSTGRES_PASSWORD: renal123
      POSTGRES_DB: renalwatch
    ports:
      - "5436:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U renal -d renalwatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: renalwatch-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  adb-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: renalwatch-adb-worker
    command: python workers/adb_worker.py
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - workers

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: renalwatch-scheduler
    command: python workers/scheduler.py
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - workers

volumes:
  pg_data:
