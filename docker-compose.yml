services:
  email-relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: renalwatch-email-relay
    command: python scripts/email_relay.py
    network_mode: host
    restart: unless-stopped
    volumes:
      - .:/app
    environment:
      EMAIL_RELAY_HOST: 0.0.0.0
      EMAIL_RELAY_PORT: 8800
      EMAIL_RELAY_TOKEN: renalwatch-demo-relay

  ngrok:
    image: ngrok/ngrok:latest
    container_name: renalwatch-ngrok
    command: http api:8000
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      api:
        condition: service_started
    networks:
      - renalwatch-net

  db:
    image: postgres:16
    container_name: renalwatch-db
    environment:
      POSTGRES_USER: renal
      POSTGRES_PASSWORD: renal123
      POSTGRES_DB: renalwatch
    ports:
      - "5436:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - renalwatch-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U renal -d renalwatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: renalwatch-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - renalwatch-net
    depends_on:
      db:
        condition: service_healthy
      email-relay:
        condition: service_started

  adb-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: renalwatch-adb-worker
    command: python workers/adb_worker.py
    volumes:
      - .:/app
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - renalwatch-net
    depends_on:
      db:
        condition: service_healthy
      email-relay:
        condition: service_started
    profiles:
      - workers

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: renalwatch-scheduler
    command: python workers/scheduler.py
    volumes:
      - .:/app
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - renalwatch-net
    depends_on:
      db:
        condition: service_healthy
      email-relay:
        condition: service_started
    profiles:
      - workers

volumes:
  pg_data:

networks:
  renalwatch-net:
    driver: bridge
